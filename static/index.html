<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировка слуха</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 { color: #333; margin-bottom: 1.5rem; }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .selection-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            align-items: center;
        }

        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            min-width: 100px;
        }

        .confirm-btn {
            background-color: #28a745;
            width: 100%;
            margin-top: 10px;
        }

        .confirm-btn:hover { background-color: #218838; }
        .confirm-btn.correct { background-color: #28a745 !important; color: white; }
        .confirm-btn.wrong { background-color: #dc3545 !important; color: white; }

        .status-message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }

        /* Стили для боковой панели */
        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 220px;
            max-width: 250px;
        }

        .sidebar h2 {
            margin-top: 0;
            color: #333;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.1rem;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-value {
            font-weight: bold;
            color: #007bff;
        }

        .buy-btn {
            width: 100%;
            background-color: #ffc107;
            color: #212529;
            font-weight: bold;
            margin-top: 15px;
            padding: 12px;
        }

        .buy-btn:hover { background-color: #e0a800; }
        .buy-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Основная игровая зона -->
    <div class="container">
        <h1>Тренировка слуха 🎹</h1>
        
        <div class="controls">
            <button id="btnPlay">▶ Play</button>
            <button id="btnNext" disabled>Next ▶</button>
        </div>

        <div class="selection-area">
            <select id="octaveSelect">
                <option value="" disabled selected>Октава</option>
            </select>

            <select id="noteSelect">
                <option value="" disabled selected>Нота</option>
            </select>
        </div>

        <button id="btnConfirm" class="confirm-btn">Подтвердить выбор</button>
        
        <div id="statusMessage" class="status-message"></div>
    </div>

    <!-- Боковая панель статистики -->
    <div class="sidebar">
        <h2>Статистика</h2>
        <div class="stat-item">
            <span>Баланс:</span>
            <span id="balanceDisplay" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span>Безопасные ошибки:</span>
            <span id="safeFailsDisplay" class="stat-value">0</span>
        </div>
        <button id="btnBuySafeFail" class="buy-btn">Купить безопасную ошибку (10)</button>
    </div>
</div>

<script>
    let currentNoteData = null;
    let currentNoteUrl = null;
    let currentOctaveData = null;
    let notesList = [];         
    let octavesList = [];       

    const btnPlay = document.getElementById('btnPlay');
    const btnNext = document.getElementById('btnNext');
    const btnConfirm = document.getElementById('btnConfirm');
    const noteSelect = document.getElementById('noteSelect');
    const octaveSelect = document.getElementById('octaveSelect');
    const statusMessage = document.getElementById('statusMessage');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const safeFailsDisplay = document.getElementById('safeFailsDisplay');
    const btnBuySafeFail = document.getElementById('btnBuySafeFail');

    // Функция для получения значения куки
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(':').shift();
    }

    // Получаем ID пользователя из куки, которую устанавливает сервер при логине
    const userId = getCookie('user_id');

    if (!userId) {
        console.error("User ID not found in cookies. Please login.");
        statusMessage.textContent = "Ошибка: пользователь не авторизован";
    }

    async function loadOptions() {
        try {
            const response = await fetch('/api/availibleNotes', { method: 'GET' });
            if (!response.ok) throw new Error('Ошибка загрузки опций');
            
            const data = await response.json();
            notesList = data.notes || [];
            octavesList = data.octaves || [];

            notesList.forEach(note => {
                const option = document.createElement('option');
                option.value = note;
                option.textContent = note;
                noteSelect.appendChild(option);
            });

            octavesList.forEach(octave => {
                const option = document.createElement('option');
                option.value = octave;
                option.textContent = octave;
                octaveSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Ошибка загрузки опций:', error);
            statusMessage.textContent = 'Не удалось загрузить список нот';
        }
    }

    async function requestNewNote() {
        try {
            const response = await fetch('/api/new-note', { method: 'GET' });
            if (!response.ok) throw new Error('Ошибка получения ноты');
            
            const data = await response.json();
            currentNoteData = data.note;
            currentOctaveData = data.octave;
            currentNoteUrl = data.audioUrl;
            
            noteSelect.value = "";
            octaveSelect.value = "";
            resetConfirmButton();
            statusMessage.textContent = '';
            btnNext.disabled = false;
        } catch (error) {
            console.error('Ошибка:', error);
            statusMessage.textContent = 'Ошибка получения ноты';
            btnNext.disabled = true;
        }
    }

    // Загрузка баланса и безопасных ошибок
    async function loadStats() {
        try {
            const [balanceRes, safeFailsRes] = await Promise.all([
                fetch(`/api/balance?user_id=${userId}`),
                fetch(`/api/num-of-safe-fails?user_id=${userId}`)
            ]);
            
            if (!balanceRes.ok || !safeFailsRes.ok) throw new Error('Ошибка загрузки статистики');

            const balanceData = await balanceRes.json();
            const safeFailsData = await safeFailsRes.json();

            balanceDisplay.textContent = balanceData.balance;
            safeFailsDisplay.textContent = safeFailsData.NumOfSafeFails;
        } catch (error) {
            console.error('Ошибка загрузки статистики:', error);
        }
    }

    btnPlay.addEventListener('click', () => {
        if (currentNoteUrl) {
            const audioPath = `/notes/${encodeURIComponent(currentNoteUrl)}`;
            try {
                const audio = new Audio(audioPath);
                audio.play();
                btnPlay.disabled = true;
                audio.onended = () => { btnPlay.disabled = false; };
            } catch (error) {
                console.error('Ошибка воспроизведения:', error);
                statusMessage.textContent = 'Ошибка воспроизведения ноты';
            }
        }
    });

    btnNext.addEventListener('click', requestNewNote);

    btnConfirm.addEventListener('click', async () => {
        if (!currentNoteData) return;

        const selectedNote = noteSelect.value;
        const selectedOctave = octaveSelect.value;

        if (!selectedNote || !selectedOctave) {
            statusMessage.textContent = 'Пожалуйста, выберите ноту и октаву';
            return;
        }

        btnConfirm.disabled = true;
        statusMessage.textContent = 'Проверка...';

        try {
            const response = await fetch('/api/confirm', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    note: selectedNote, 
                    octave: selectedOctave,
                    currentNote: currentNoteData,
                    currentOctave: currentOctaveData 
                })
            });
            
            if (!response.ok) throw new Error('Ошибка сети');
            const data = await response.json();
            
            if (data.correct) {
                btnConfirm.className = 'confirm-btn correct';
                statusMessage.textContent = `Верно! 🎉. Точность - ${data.accuracy} %`;
            } else {
                btnConfirm.className = 'confirm-btn wrong';
                statusMessage.textContent = `Неверно. Правильная нота: ${data.correctNote}. Точность - ${data.accuracy} %`;
            }

            // Перезагружаем статистику, чтобы отобразить новый баланс и количество ошибок
            await loadStats();
            
            setTimeout(() => resetConfirmButton(), 1000);
        } catch (error) {
            console.error('Ошибка:', error);
            statusMessage.textContent = 'Ошибка проверки';
            resetConfirmButton();
        }
    });

    // Покупка безопасной ошибки
    btnBuySafeFail.addEventListener('click', async () => {
        btnBuySafeFail.disabled = true;
        btnBuySafeFail.textContent = 'Покупка...';
        
        try {
            const response = await fetch('/api/update-safe-fails', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId.toString() })
            });
            
            if (!response.ok) throw new Error('Ошибка покупки');
            
            // Перезагружаем статистику, чтобы отобразить новый баланс и количество ошибок
            await loadStats();
            
            btnBuySafeFail.textContent = 'Куплено!';
            setTimeout(() => {
                btnBuySafeFail.textContent = 'Купить безопасную ошибку (10)';
            }, 1500);
        } catch (error) {
            console.error('Ошибка покупки:', error);
            alert('Не удалось купить безопасную ошибку. Проверьте консоль.');
            btnBuySafeFail.textContent = 'Купить безопасную ошибку (10)';
        } finally {
            btnBuySafeFail.disabled = false;
        }
    });

    function resetConfirmButton() {
        btnConfirm.className = 'confirm-btn';
        btnConfirm.disabled = false;
    }

    loadOptions().then(() => {
        requestNewNote();
        loadStats(); // Загружаем статистику при старте
    });
</script>

</body>
</html>
